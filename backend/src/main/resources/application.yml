server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/course_manager?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:course-manager-jwt-secret-key-2026-must-be-at-least-256-bits}
  expiration: 86400000  # 24小时（毫秒）

logging:
  level:
    com.institution.coursemanager: debug

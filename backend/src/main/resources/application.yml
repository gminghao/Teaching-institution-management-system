server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/course_manager?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:DevOnlySecretKeyForLocalDevelopmentMustBe256BitsLongEnough}
  expiration: 7200000  # 2小时（毫秒）

# CORS 配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
